<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Observatório Itajaí - Dashboard Mobilidade</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/esri-leaflet@3.0.10/dist/esri-leaflet.js"></script>
    <script src="https://unpkg.com/esri-leaflet-vector@4.2.3/dist/esri-leaflet-vector.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { margin: 0; display: flex; flex-direction: column; height: 100vh; font-family: 'Segoe UI', Tahoma, sans-serif; background: #f8f9fa; }
        #header { height: 60px; background: #2c3e50; color: white; display: flex; align-items: center; padding: 0 20px; justify-content: space-between; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        #map { flex: 1; z-index: 1; background: #e9ecef; }
        #dashboard { height: 35%; background: white; border-top: 4px solid #34495e; display: flex; padding: 15px; gap: 15px; box-sizing: border-box; }
        .chart-container { flex: 1; position: relative; border: 1px solid #dee2e6; border-radius: 8px; padding: 10px; background: #fff; }
        
        /* Estilo do Termômetro e Legenda */
        .info-panel { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 0 15px rgba(0,0,0,0.1); border: 1px solid #ccc; width: 250px; }
        .therm-wrapper { height: 150px; width: 25px; background: #eee; margin: 10px 45px 10px 10px; border-radius: 15px; position: relative; border: 2px solid #bdc3c7; float: left; }
        .therm-bar { width: 100%; background: linear-gradient(to top, #2ecc71, #27ae60); position: absolute; bottom: 0; border-radius: 10px; transition: height 0.5s ease; }
        #marker-today { position: absolute; right: -15px; width: 0; height: 0; border-top: 8px solid transparent; border-bottom: 8px solid transparent; border-right: 12px solid #2c3e50; transition: bottom 0.5s ease; margin-bottom: -8px; }
        .therm-label { position: absolute; left: 35px; font-size: 10px; width: 170px; line-height: 1.2; }
        
        .legend-box { clear: both; padding-top: 10px; border-top: 1px solid #eee; font-size: 11px; }
        .legend-box i { width: 12px; height: 12px; float: left; margin-right: 8px; border-radius: 50%; margin-top: 2px; }
    </style>
</head>
<body>

<div id="header">
    <div><strong>Observatório Itajaí</strong> | Análise de Segurança Viária</div>
    <input type="date" id="dataSelector" value="2023-01-01">
</div>

<div id="map"></div>

<div id="dashboard">
    <div class="chart-container"><canvas id="chartEvol"></canvas></div>
    <div class="chart-container"><canvas id="chartVeic"></canvas></div>
</div>

<script src="geometria_h3.js"></script>
<script src="estatisticas_periodo.js"></script>

<script>
    // 1. Inicialização do Mapa
    const map = L.map('map').setView([-26.9068, -48.6778], 13);
    
    L.esri.Vector.vectorTileLayer("7a110ef9198540068341e6908c6bf298", {
        portalUrl: "https://arcgis.itajai.sc.gov.br/portal",
        attribution: 'Prefeitura de Itajaí'
    }).addTo(map);

    let geoLayer, evolChart, veicChart, lastClickedLayer;

    // 2. Painel de Informações Lateral (Termômetro)
    const infoControl = L.control({position: 'bottomright'});
    infoControl.onAdd = function() {
        const div = L.DomUtil.create('div', 'info-panel');
        div.innerHTML = `
            <div style="text-align:center; font-weight:bold; font-size:11px; margin-bottom:8px;">DESEMPENHO DO PERÍODO</div>
            <div class="therm-wrapper">
                <div id="thermo-bar" class="therm-bar" style="height: 0%"></div>
                <div id="marker-today" style="bottom: 0%"></div>
                <div class="therm-label" style="top:0">Máx: <b id="txt-max">0</b></div>
                <div class="therm-label" style="bottom:0">Mín: <b id="txt-min">0</b></div>
            </div>
            <div style="font-size:11px; margin-left:45px;">
                <span style="color:#2c3e50">◀ Selecionado</span><br>
                <b id="txt-hoje" style="color:#27ae60; font-size:14px;">0 verdes</b>
            </div>
            <div class="legend-box">
                <i style="background:#e74c3c"></i> Aumento | <i style="background:#f1c40f"></i> Estável | <i style="background:#2ecc71"></i> Redução
            </div>`;
        return div;
    };
    infoControl.addTo(map);

    // 3. Funções de Carregamento e Formatação
    function carregarDados(dataStr) {
        const old = document.getElementById('script-dia');
        if (old) old.remove();

        const script = document.createElement('script');
        script.id = 'script-dia';
        script.src = `dados_diarios/${dataStr}.js`;
        script.onload = () => {
            if (typeof dadosDia !== 'undefined') {
                renderizarMapa(dadosDia);
                const qtdVerdes = estatisticasPeriodo.historico[dataStr] || 0;
                atualizarTermometro(qtdVerdes);
            }
        };
        document.head.appendChild(script);
    }

    function atualizarTermometro(valor) {
        const ep = estatisticasPeriodo;
        
        // Formatação solicitada: DD/MM/AA (Ex: 15/05/23)
        const fmtData = (s) => {
            if (!s) return "";
            const partes = s.split('-'); // Recebe "YYYY-MM-DD"
            const dia = partes[2];
            const mes = partes[1];
            const anoCurto = partes[0].slice(-2); // Pega os últimos 2 dígitos do ano
            return `${dia}/${mes}/${anoCurto}`;
        };
        
        let pct = ((valor - ep.minVerdes) / (ep.maxVerdes - ep.minVerdes)) * 100;
        if (isNaN(pct)) pct = 0;
        pct = Math.max(0, Math.min(pct, 100));

        document.getElementById('thermo-bar').style.height = pct + '%';
        document.getElementById('marker-today').style.bottom = pct + '%';
        
        // Atualização dos textos com as datas recordistas
        document.getElementById('txt-max').innerHTML = `${ep.maxVerdes} <span style="color:#7f8c8d">(${fmtData(ep.dataMax)})</span>`;
        document.getElementById('txt-min').innerHTML = `${ep.minVerdes} <span style="color:#7f8c8d">(${fmtData(ep.dataMin)})</span>`;
        document.getElementById('txt-hoje').innerText = valor + " verdes";
    }

    function renderizarMapa(dados) {
        if (geoLayer) map.removeLayer(geoLayer);
        geoLayer = L.featureGroup().addTo(map);

        Object.keys(dados).forEach(id => {
            if (!geometriaH3[id]) return;
            const info = dados[id];
            const diff = info.m["6d"] - info.m["6a"];
            
            const cor = diff > 1000 ? '#e74c3c' : (diff < -1000 ? '#2ecc71' : '#f1c40f');

            const poly = L.polygon(geometriaH3[id], {
                color: '#333', fillColor: cor, fillOpacity: 0.6, weight: 1, interactive: true
            }).addTo(geoLayer);

            poly.on('click', (e) => {
                if (lastClickedLayer) lastClickedLayer.setStyle({ weight: 1, color: '#333' });
                lastClickedLayer = e.target;
                e.target.setStyle({ weight: 3, color: '#000' });
                e.target.bringToFront();
                atualizarDashboard(info, id);
            });
        });
    }

    function atualizarDashboard(info, id) {
        if(evolChart) evolChart.destroy();
        evolChart = new Chart(document.getElementById('chartEvol'), {
            type: 'line',
            data: {
                labels: ['-6m', '-3m', '+3m', '+6m'],
                datasets: [{ 
                    label: 'Custo Social R$', 
                    data: [info.m["6a"], info.m["3a"], info.m["3d"], info.m["6d"]], 
                    borderColor: '#2c3e50', 
                    backgroundColor: 'rgba(44, 62, 80, 0.1)',
                    fill: true, 
                    tension: 0.3 
                }]
            },
            options: { maintainAspectRatio: false, plugins: { title: { display: true, text: 'Evolução Hexágono: ' + id } } }
        });

        const tipos = [...new Set([...Object.keys(info.va), ...Object.keys(info.vd)])];
        if(veicChart) veicChart.destroy();
        veicChart = new Chart(document.getElementById('chartVeic'), {
            type: 'bar',
            data: {
                labels: tipos,
                datasets: [
                    { label: 'Antes (-3m)', data: tipos.map(t => info.va[t] || 0), backgroundColor: '#bdc3c7' },
                    { label: 'Depois (+3m)', data: tipos.map(t => info.vd[t] || 0), backgroundColor: '#3498db' }
                ]
            },
            options: { maintainAspectRatio: false }
        });
    }

    document.getElementById('dataSelector').onchange = (e) => carregarDados(e.target.value);
    
    // Inicialização automática com a primeira data disponível
    window.onload = () => carregarDados("2023-01-01");
</script>
</body>
</html>
