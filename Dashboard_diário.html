<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard de Mobilidade - Itajaí</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { margin: 0; display: flex; flex-direction: column; height: 100vh; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f3f5; }
        
        #header { 
            height: 60px; background: #2c3e50; color: white; 
            display: flex; align-items: center; padding: 0 20px; 
            justify-content: space-between; box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 1000;
        }

        #map { flex: 1; z-index: 1; }

        #dashboard { 
            height: 32%; background: white; border-top: 4px solid #2c3e50; 
            display: flex; padding: 10px; gap: 15px; box-sizing: border-box;
        }

        .chart-container { flex: 1; height: 100%; min-width: 0; position: relative; border: 1px solid #e1e8ed; border-radius: 6px; padding: 5px; }

        .legend {
            background: white; padding: 12px; line-height: 22px; color: #333;
            box-shadow: 0 0 15px rgba(0,0,0,0.2); border-radius: 8px; font-size: 13px;
        }
        .legend i { width: 16px; height: 16px; float: left; margin-right: 10px; border-radius: 3px; border: 1px solid #999; }

        #loading {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.8); display: none;
            justify-content: center; align-items: center; z-index: 9999;
            font-weight: bold; color: #2c3e50;
        }

        input[type="date"] { padding: 8px; border-radius: 4px; border: 1px solid #ccc; }
    </style>
</head>
<body>

<div id="loading">A processar dados...</div>

<div id="header">
    <strong>Monitorização de Custo Social - Itajaí</strong>
    <div>
        Data: <input type="date" id="dataSelector" min="2023-01-01" max="2023-06-30" value="2023-01-01">
    </div>
</div>

<div id="map"></div>

<div id="dashboard">
    <div class="chart-container"><canvas id="evolucaoChart"></canvas></div>
    <div class="chart-container"><canvas id="veiculosHistograma"></canvas></div>
</div>

<script src="geometria_h3.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // Configuração do Mapa com Tile estável
    const map = L.map('map').setView([-26.91, -48.67], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    let geoLayer, evolChart, histChart, lastClickedLayer;
    const infoLegenda = L.control({position: 'bottomright'});

    function alternarLoading(show) {
        document.getElementById('loading').style.display = show ? 'flex' : 'none';
    }

    function carregarDadosDoDia(dataStr) {
        alternarLoading(true);
        const oldScript = document.getElementById('script-dia');
        if (oldScript) oldScript.remove();

        const script = document.createElement('script');
        script.id = 'script-dia';
        script.src = `dados_diarios/${dataStr}.js`;
        
        script.onload = () => {
            renderizarHexagonos(dadosDia);
            alternarLoading(false);
        };
        script.onerror = () => {
            alert("Erro ao carregar dados diários. Verifique a pasta 'dados_diarios'.");
            alternarLoading(false);
        };
        document.head.appendChild(script);
    }

    function renderizarHexagonos(dataDoDia) {
        if (geoLayer) map.removeLayer(geoLayer);
        geoLayer = L.featureGroup().addTo(map);

        let contagem = { vermelho: 0, amarelo: 0, verde: 0 };

        Object.keys(dataDoDia).forEach(id => {
            const info = dataDoDia[id];
            const coords = geometriaH3[id];
            if (!coords) return;

            const antes = info.m["6a"];
            const depois = info.m["6d"];
            const diff = depois - antes;
            const perc = antes > 0 ? diff / antes : (depois > 0 ? 1 : 0);

            // Lógica de Cores por Tendência
            let cor = '#f1c40f'; // Amarelo (Estável)
            if (diff > 0 && perc > 0.05) { cor = '#e74c3c'; contagem.vermelho++; }
            else if (diff < 0 && Math.abs(perc) > 0.05) { cor = '#2ecc71'; contagem.verde++; }
            else { contagem.amarelo++; }

            const poly = L.polygon(coords, {
                color: cor, fillColor: cor, fillOpacity: 0.5, weight: 1
            }).addTo(geoLayer);

            poly.on('click', (e) => {
                // Reset do destaque anterior
                if (lastClickedLayer) {
                    lastClickedLayer.setStyle({ weight: 1, color: lastClickedLayer.options.fillColor });
                }
                // Novo destaque: Contorno preto forte
                lastClickedLayer = e.target;
                e.target.setStyle({ weight: 4, color: '#000000', opacity: 1 });
                
                atualizarDashboard(info);
            });
        });

        atualizarLegenda(contagem);
        if (Object.keys(dataDoDia).length > 0) map.fitBounds(geoLayer.getBounds(), {padding: [20,20]});
    }

    function atualizarLegenda(c) {
        infoLegenda.onAdd = function () {
            const div = L.DomUtil.create('div', 'legend');
            div.innerHTML = `<strong>Tendência Semestral</strong><br>` +
                `<i style="background: #e74c3c"></i> Aumento: ${c.vermelho}<br>` +
                `<i style="background: #f1c40f"></i> Estável: ${c.amarelo}<br>` +
                `<i style="background: #2ecc71"></i> Redução: ${c.verde}`;
            return div;
        };
        infoLegenda.addTo(map);
    }

    function atualizarDashboard(info) {
        // 1. Gráfico de Evolução (Linha)
        if(evolChart) evolChart.destroy();
        evolChart = new Chart(document.getElementById('evolucaoChart'), {
            type: 'line',
            data: {
                labels: ['6m Antes', '3m Antes', '3m Depois', '6m Depois'],
                datasets: [{
                    label: 'Custo Social (R$)',
                    data: [info.m["6a"], info.m["3a"], info.m["3d"], info.m["6d"]],
                    borderColor: '#2c3e50', backgroundColor: 'rgba(44, 62, 80, 0.1)',
                    tension: 0.4, fill: true
                }]
            },
            options: { maintainAspectRatio: false, plugins: { title: { display: true, text: 'Histórico de Impacto Económico' } } }
        });

        // 2. Histograma de Veículos (Barras Comparativas)
        // Extrair tipos de veículos únicos dos dois períodos
        const tipos = [...new Set([...Object.keys(info.va || {}), ...Object.keys(info.vd || {})])];
        const contagemAntes = tipos.map(t => info.va[t] || 0);
        const contagemDepois = tipos.map(t => info.vd[t] || 0);

        if(histChart) histChart.destroy();
        histChart = new Chart(document.getElementById('veiculosHistograma'), {
            type: 'bar',
            data: {
                labels: tipos,
                datasets: [
                    { label: '3 Meses Antes', data: contagemAntes, backgroundColor: '#95a5a6' },
                    { label: '3 Meses Depois', data: contagemDepois, backgroundColor: '#3498db' }
                ]
            },
            options: { 
                maintainAspectRatio: false, 
                plugins: { title: { display: true, text: 'Quantidade de Veículos (Antes vs Depois)' } },
                scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
            }
        });
    }

    document.getElementById('dataSelector').addEventListener('change', (e) => carregarDadosDoDia(e.target.value));
    window.onload = () => carregarDadosDoDia("2023-01-01");
</script>
</body>
</html>
